釣竿洪波洶湧暮江寒錦鱗也解隨鈎上一吸滄溟徹底乾不與萬法為侶臨風索笑傲氷霜吐露春光漏泄香兩岸斷橋人不渡一川踈影橫斜陽大死底人却活時如何不許夜行投明須到一回見面不相瞞便把當臺古鏡看暗裏照君還照我清光一片逼人寒馬祖三十年不少鹽醬乞兒無縷又無𧟋餿飯殘羹勿處檐拈起多年破席袋人前更不懼羞慚仰山推出枕子水牯牛兒也可誇鼻繩拽斷臥煙霞驀然癢處輕抓著便向人前露尾巴不昧本來人請師高著眼直下怪雨狂風勢欲傾陰垂六合見雲騰一條瀑布巖前落界破青山千萬層在上喫油糍臭口才開露賊身看看平地惹埃塵傍觀不解深藏舌也作黏牙綴齒人道吾云生也不道死也不道撒出驪珠光炯炯劈開美玉洞無痕幾回賤賣無人買堪笑乞兒孤此恩鳥窠吹布毛草裏傷人血濺流等間解著毒蛇頭炎炎惡風衝天上赫日光中結蜃樓首山竹篦話傾山紅爐鐵彈圓輕輕撥著骨毛寒紅光直透青霄外塞壑填溝無處安雪峰南山鱉鼻蛇躍出南山鱉鼻蛇引他間漢競隨邪萬人叢裏咬肩過唯是親兒識得爺北斗裏藏身閙裡輕輕揚碌磚衲僧鼻孔一時穿掀天笑罷歸來矣打著南邊動北邊南泉斬猫家常茶飯不多般遇客延留禮數寬若是上方曾飽者和盤呈獻不能餐趙州頭戴草鞋少年宕子愛雕青文彩肌膚相映明閙裡祇圖遮俗眼強將赤體以為榮庭前柏樹子一片油絲水面浮隨波搖動遂波流等間拋在江湖裏綰著金鱗未肯休三聖逢人即出興化逢人不出拏得大家些子本門前鋪席恣開張到頭滯貨同行市價數高低兩不爭僧問六祖黃梅意旨甚人得祖云會法人得僧云和尚還得不祖云我不會佛法舉目寥寥絶點新老來無處可安身曾經幾度雪霜苦話著楊花愁殺人睦州云見成公案放你三十棒逆水張帆過海門漫天煙霧暗昏昏舉頭便見扶桑國休把南針定曉分紫璘供奉注經國師以水一盞米七粒筯一雙示之柳色重重翠作堆豁開三徑不紆回門前祇是舊時底付與淵明歸去來定上座見臨際擒住與一掌定禮拜忽然有省柴頭火種欻然紅荒草堆中遇疾風眼底蟭螟勿棲泊撒開猛焰恣燒空勘婆子語婆子孤窮要嫁人趙州聞得便相親歸來只說恩情話堪笑無端惹客塵魯祖見僧面壁髑髏遍野難遮掩礙寒行人轉見垂從此一面看驗後也須拙地為深埋靈雲見桃花玄沙云未徹靈雲一見更無疑未徹明明說向誰榼𣜂堆頭添糞𭏅順風吹了逆風吹與麼也得不與麼也得桃花開了杏花開陳陳香風撲鼻來零落盡隨流水去更無一片點蒼苔托鉢話燒紙無端引崇來看看家鬼返為灾青天白日弄門戶背手掩來順手開洗鉢話荒村無物當風流不解梳粧不識羞草裡有花隨手折等間插在野人頭趙州訪二庵主天雄附子出綿州價數高低一等酬治病殺人隨所用到頭難覔箇蹤由因學者生死到來如何抵當師即答以四偈生死到來何抵當石人頭上忽生瘡這些癢處才撓著便向人前孟八郎生死到來何抵當乞兒相見便傾囊寥寥四顧渾無有堪笑一身沒處藏生死到來何抵當蕭然歸去路堂堂到家句子聊相寄寫入碧天鴻鴈行生死到來何抵當月明靜夜共商量荷華荷葉通消息一陳風來一陳香佛祖贊出山相眼冷含霜耳帶環和頭和面草斕班一回春至一回緑老子何曾解出山上無片瓦下無錐一箇窮身只自知從此入流隨所住手中携箇活魚兒維摩手提拂子坐胡床眼似流星𩯭似霜開不二門長示疾却將好肉剜成瘡達磨因販私鹽無端過界撞著梁王不勘自敗狼藉官場遭人笑怪匾檐脫却兩頭至今全無買賣龐居士得便宜是落便宜傾盡家珍賣笊籬男女聚頭無結果這般翁子大無知祖圖點汙人間間紙墨紙因五葉一花開看他次第傳芳去總是邯鄲學步來寒山拾得寒拾相逢便拍肩雙收雙放芙掀天古今一片間田地露出尋常茗菷邊三教圖六耳不同謀相看已漏泄都來只三人證龜却成鱉者也之乎無為寂滅養家一般道路各別別不別掉棒打落天邊月觀流水觀音一片寒泉劈面來斷崖嶮處滑如苔舉頭只麼隨流水大士何曾眼豁開巖頭禪師甘贄居士安居俗舍太無稽黑白分明類不齊謾向人前露針線賺他女子與夫妻布袋眼冷千江月眉橫萬疊山杖頭挑布袋信腳到人間蝦子斗裏跳出手中揑定不入水泥喪却性命歌偈卒庵歌三間茅屋堪投老草草生涯隨分好月池當戶鏡光寒竹徑繞櫩通大道風吹葉葉自成堆信手拈來一莖草賤如泥貴似寶要用便用不須討遼天鼻孔被渠穿來往行人俱絆倒阿呵呵會也麼問取前村張四哥闡提歌無住著老禪魔歡喜少惡性多三毒花中結苦果蒺藜園裡養蜂窠說調普賢賣白象呼喚兒童填黃河戲弄南山老虎踏翻北海滄波洗盡佛祖冤法戰罷干戈五千文字拭抹布一會靈山糞掃籮謾將無義語唱起闡提歌調古不堪聽聲極透巖阿能妙轉絶捫摩六用機中抽線電光影裏攛梭織成無縫襖繡出沒底靴三臺舞罷呵呵笑笑倒多年黑老婆草鞋歌村裏人有意知就手織成最容易長短大小在目前密用工夫多快利草窠裡面跳出來結却繩頭有巴鼻牢束跟緊在耳擲地作金聲舉步離泥水著入千山與萬山把定腳頭并腳尾趙州盡力戴不起玄沙喫絆躍著指拖來拖去底頭穿輕輕揚在糞裏拄杖歌拄杖子最超絶到頭到尾黑鱗皸凜凜風生堅似鐵同我行共我歇恣縱橫任拖拽攪動碧潭龍打落天邊月有時拄到千峰頂千峯萬峰俱迸裂有時攛人荒草中潛藏影跡難分別芭蕉有屈無人雪大隨提起重漏泄而今老大懶扶持信手拗來成兩橛明宗古徑苔生路已差無根樹上發空花一番花落成空果信手拈來是苦瓜羅漢菜根塵脫落超諸有豈與尋常種草同塞斷衲僧三寸舌橫身鉢裏展神通迎善財歸南樓古寺間房共掩扉相逢彼此罷參歸時難只得同杳火莫信間人說是非常禪師荷衣沼遇物合人仰祖風弊衣遺在一池中秋風吹破春風補不犯清波一線功禮佛照禪師塔憶得尋流日重來走一遭跨門相見處全不犯波濤訪育王東堂空叟和尚夜話病餘相對兩枯樁霜髮毿𣯶映暖窗縱有丹青描不得到頭六六不成雙因說多年破草鞋祖翁插腳強安排從茲狼藉渾無底次第提持轉見乖禮蜜庵禪師塔綿裏褁刀難近傍飯中有藥出閩鄉至今怕飲山中水我昔曾遭蠱毒傷送米上佛照禪師捻不成團撥不開一槌直下絶纖埃從茲幾度經節後盡向箕前跳出來訪香山松源和尚卒菴自笑風流甚醉後何須若戀杯十字路頭荒草店引他來往兩三回謝無用和尚惠鞋信手裁成任短長密通一線透中央看來只是舊時底著了何妨到處行送浙翁禪師住徑山古路滑如苔衲僧忘故步人從天台來却住徑山去家醜向外揚生鐵被蟲蠧一陳落華風吹作送行句寄滅翁禪師老去隱如虎難瞞在一班入林最容易上樹極艱難舌底千溪水眉間萬疊山年深拽不動草種轉癡頑寄台州瑞巖高原禪師住靈隱水出在高原源深到冷泉飲者禿却舌嗅者鼻孔穿口鼻兩俱喪妙用絶正偏側耳與招手聽猿同呼猿藤蘿影裡石磊磊雙㵎合流波漣漣南來北來腳下過欲知冷暖待驢年庵中夏草中得路便藏身不入他家水牯群彈指一聲為號令低頭問訊當殷勤耐重坐斷孤危未肯休荷擔傑閣與層樓柦翁活計丘山重得力全歸頂𩕳頭山居老來歸隱故山深獨抱無絃絶賞音靜對凉風彈一曲亂蟬聲合奏青林居山活計隨時用觸事都從舊路行只把手頭些子力撥開火種自燒鐺朝陽穿破衲笑看體上衣斷雲欲飛走朝陽忽相逢針眼已通透對月了殘經待月了殘經文義何曾有分付與癡兒黃葉卷在手更有外集二卷板留東湖錢堰高路分宅
