body:
  text: 目次慶元府仗錫山延勝禪院語録南康軍雲居山真如禪院語録東湖巷居語頌古佛祖贊歌偈慶元府仗錫山延勝禪院率菴和尚語録小師了見編嘉定十二年四月十三日入院指山門直進直出直行直用瞥轉玄關百發百中佛殿指地指天草賊大敗入草求人聊展三拜方丈據此丈室無可不可要行即行要坐便坐漆桶相挨一時打破三腳蝦䗫透九垓笑倒嵩山破竈墮法座一兩三四五六七八九十坐斷頂𩕳頭千聖望不及上堂湖上一片雲明月為知己却被清風吹吹入深山裏所以遇物即宗隨緣作主直得萬象交參七峰稽首巖花獻笑溪水潺潺分明漏泄真機切忌草中著腳等間一躍抹過太虗垂絲萬丈潭中獨聳千峰頂上猶是衲僧尋常用處且道不動干戈到家一句又作麼生太平有象乾坤靜皇道無私日月明當晚小參打破虗空無縫衲僧隨處受用却因聖制入山雲北雲南做夢所以三世諸佛歷代祖師天下老和尚山河大地日月星辰草木昆蟲各各做夢新長老近離名山來遊巖谷倒拈拄杖返著芒鞋透過二十里雲笑看洞天明月未免開眼做夢晝思夜夢境夜夢晝思緣塵劫與今日曾無有門然且道諸法是夢耶云何是諸法諸法非夢耶云何在夢中譬如諸人影像在鏡中現離却鏡何者是像直下頓超影像了了知歸又是泥中洗土太白禪師忽聞知不覺呵呵大笑道我夢已覺汝夢方做一覺一做有唱有和午夜金雞啼一聲覺紛紛俱裂破結夏上堂今朝結制事事超詣問訊燒香衲僧巴鼻人事上下巡堂次弟無位真人驀忽噴嚏為何如此布袋頭結吉無不利上堂太白禪師全無伎倆一錫飛來占斷千嶂以中心樹建立聖像合水和泥根生土長不用換骨脫胎不須起模打樣一段真實身心腦後圓光萬丈索上堂記得僧參老觀觀引示之遂成山偈老觀當場闡大機逢人赤手為提持若能直下知端的佛海波瀾無盡時上堂舉僧問雲門如何是諸佛出身處雲門云東山水上行頌曰東山水上行乾元利貞亨誵訛一箇字才子競頭爭上堂舉僧問百丈如何是奇特事百丈云獨坐大雄峰拈云百丈被這僧一問不覺手穿腳露今日忽有人問仗錫如何是奇特事只對他道祖師留得泥團在喫者從教飽則休端午上堂今朝正當端午節衲僧倒用真妙訣轉聖作凡點金成鐵却把山茶以替竹葉角黍滿盤菖蒲細切雖然俗氣未除也要大家暖熱正與麼時百草頭邊艾人歡悅千峰影裏笑不休野猿時把藤蘿拽中夏上堂禁足不定足居中不住中去來無罣礙踢踏活虗空射殺南山虎翻身控角弓上無攀仰下絶己躬孤逈逈一塵不立清寥寥目斷千峰白雲片片流水重重驀忽和盤掇轉却要喚西作東生鐵團上迸開罅縫枯河道裏露出魚蹤不是妙用亦非神通大家無別事平等主人翁咄老來雙耳聾上堂趙州南石橋北觀音院裏有彌勒祖師遺下一隻履直至而今覔不得趙州老子信手栽荊棘當門種蒺䔧四方人不到徒自暗攢眉大衆要過趙州關麼等間回首處六月草五日上堂世尊拈花迦葉破顏只因學步失却邯鄲爭似七峰今日斫却庭前樹放出雲外山行人才眨眼身在畫圖間鳥飛不到處今古絶躋攀正與麼時洞天人去後誰解倚欄干七月初五日上堂打鼓槌鑼競上竿幾人平地足心酸七峰有箇安身法袖手無言冷處看看即易上即難搭索上橫身剎竿上鬪走驀忽轉身打箇筋斗正與麼時佛祖當場各出標手微笑因拈華一時成漏逗洞山麻三斤雲門乾屎橛德山入門棒臨濟入門喝陽焰何曾止得渴衲僧別有條章今日對衆分雪珠稱夜光劍號巨闕解夏上堂索語仙居多異草聖地絶凡蹤秋風動鱗甲生蛇化活龍還有興雲吐霧者麼問答不録安居九十日閒中滋味長幸好一盤飯何用糝椒薑升堂重舉話雪上更加霜若是知味者縱遇天厨禁臠豈肯咽津若是未知味者望見屠門須當大嚼七峰杓柄有手添也得減也得有時清寥寥絲糝不留有時濃滴滴五味俱全今日打作一團向無底鉢中普同供養冬至小參分冬時節一物不違大家出手各各提持白糍片片打硬山果大小隨宜衲僧家牙如劍樹口似龍池入齒下咬著吞吐唾霧霏霏驀忽撞著栗棘直得暗裏攢眉揚在糞掃堆上千聖從來不知洞山掇轉處喪却目前機正當與麼時應時納祐作麼生道午夜群陰消爍盡一陽花發向南枝復頌洞山話強言一物揚家醜引得傍觀入座來笑裏和盤輕掇轉七峰岌嶪舞三臺次日上堂晴明冬至吉無不利坐臥經行焚香掃地祖師眼睛衲僧巴鼻八節四時各安本位竪拂子云拂子點頭歡歡喜喜洞天優游欣逢節序君子道長小人回避時添一線長光陰不虗棄把定乾坤據何道理磉下藏黃金豐城埋劒氣佛成道日上堂因覩明星悟道未免全身入草帶纍後代兒孫却把白衣染貌七峰當日見他劈面一拳打倒為何如此雖是善因而招惡果歲除上堂七峰無可分歲抖擻多年活計拂子擺尾搖頭解作獅子遊戲等間咾吼一聲直得驚天動地東村老徹夜燒錢地爐神不敢瞌睡𪹼竹聲中聊說一偈歲除無物可相延四壁深圍滿屋煙幾度撥開還自問柴頭盡處是新年元日上堂元正啓祚萬物咸新不勞擬議覿體全真到此更須進步却來拂子頭上翻身且道應時納祐一句作麼生道爐內寒灰重發焰山中枯木盡生春正月五日上堂月不過五今日親到知時識節隨宜愛道不說向上宗乘不拋東山暗號露柱與燈籠撞著呵呵笑且道笑箇甚麼韓信放鐵頌百丈野狐話百丈野狐石女無夫一回淚下滄海乾枯謝信監寺歸庫司監寺入寺設供拈七條上堂三通鼓罷長老升堂兩班問信侍者燒香未曾啓口各各舉揚道從信入信能主張以長就短以短從長有客雲外至設供飽枯腸有餘刃別有好商量且道商量箇甚麼暗中信手才拈得贏得呵呵笑一場拈雲門問僧聞鐘聲因甚披起袈裟頌曰鐘聲披起多羅信手拈來不在多堪笑當年明上座狼忙馳逐太奔波拈得袈裟次日上堂謝袈裟拈得喜輕便一片閒雲擁半肩莫怪逢人頻抖擻借婆裙子拜婆年若向這裏見得酬恩報德一切已周其或未然盤陀石上難提掇笑倒當年踏碓人雪中上堂上方一夜開香積天曉堂中喫雪團信手拈來當面擲不知誰識為人寒上堂春雪消春水足春風吹起洞天雲落梅點破蒼苔緑言發非聲色前不物百草頭露眼睛虗空裏揣出骨林間衲子樂無為曉來唱箇太平曲如何是太平曲新歲相逢伏惟萬福太白菴堅塔主為本師才監寺百日請升座今朝二月二十五等間觸發千鈞弩一箭中紅心大地無寸土四圍上下絶遮欄露出太白菴中主去歲因喪本師歸未免聲聲呌冤苦苦中樂樂中苦喝退慈明舊日婆移凶就吉改墳墓正與麼時且道才監寺在甚處南溪流水青如螺深居落花紅似雨先師面目儼然存分付老堅堅收取結座大衆才公監寺即今是生邪是死邪更聽一頌了知生死本來同無數深紅間淺紅堪笑衲僧無用處盡將衣鉢付春風四月八日上堂勞生正昏睡侵曉已先行到家一著子日出事還生當時若撞著箇天然氣槩者趕散九龍踢翻香水免得遞相鈍置今日隨邪逐惡向大殿裏三杓殷勤當頭澆潑上堂今朝四月初十衲僧獨行特立等間瞥轉玄關揑碎虗空出汁電光裡𨁝跳微塵裡出沒嶮峻崖前百步䃈一級自然高一級腳頭腳尾不爭多千里烏騅追不及結制上堂抽拈歡喜袋聖制已臨七峰劄寨以六根為門戶以一念為主將內不放出外不放入下板頭著身蒲團上廝崖陳勞既圓不通過界縱饒德山棒如雨點臨濟喝似雷奔到此見怪不怪其怪自壞坐籌帷幄決勝有賴歡喜袋笑裡打開衣中寶拈得慶快不用繞遍長廊不須巡寮買賣蒿湯聊備禮儀大家觸禮三拜上堂夜來無一事天曉報上堂幸好一盤飯何用糝桝薑雖然如是粗餐易飽細嚼難飢上堂三世諸佛不知有顛狂普化翻筋斗狸奴白牯却知有寒拾相逢開笑口野干鳴師子吼八兩半斤十舛一斗不從他覔須還自有如何是自有底消息犬不擇家貧子不嫌母醜頌柏樹子話趙州庭柏說向禪客物是實價錢須足陌上堂舉僧問馬祖如何是佛祖云即心是佛如何是道無心是道佛與道相去多少佛如展手道似握拳馬大師盡情撒向諸人面前了也其或未然更聽一頌佛如展手道似握拳全提正令無黨無偏蟭螟眼裏放夜市大蟲舌上打秋千解夏上堂十五日已前是結十五日已後是解結也著解也著開眼合眼伸腳縮腳佛祖老婆應病與藥而今正體全安藥病一時掃却赤條條空索索月下風前嘯一聲驚起松梢千歲鶴鶴錯風吹殿角搖鈴鐸謝一首座上堂一切即一一即一切者也之乎雞豚狗彘驀忽擘破面皮喝退德山臨濟黃檗施財甘贄密契財法二施等無差別指鹿為馬喚龜作鱉說時點點時說要作破家兒孫宜把祖燈吹滅雖然如是且道上下三指彼此七馬如何分雪休分雪簷細雨何曾歇上堂今朝當八月旦衲僧眼親手辨放出金剛箭射落天邊雁蒸不熟煮不爛揑不聚撥不散解空不解深藏惹得空中贊歎休贊歎換却天下眼睛只消一箇木梙解夏小參時作大風水求道如求雨乾枯日夜愁忽然風雨至萬壑盡爭流直得天下萬物沾潤三井龍王出頭雲南如劈箭雲北似傾湫激石怒雷吼翻空雪浪浮忽然風雨息平地一時休衲僧家騎箇水牯牛多快活百無憂健即行困即歇布袋頭親解結釘打釘鐵打鐵寒道寒熱道熱此是諸佛心宗亦名單提妙訣七峰峰頂滑如苔寒山拾得相拖拽瑞慶節上堂普天迎瑞氣遍界慶生辰水有朝宗意葵傾向日心衲僧隨日轉林下仰天庭正與麼時祝聖一句如何吐露竟拈無孔笛吹起萬年歡出去歸來上堂白雲無定明月有期欲出未出似歸不歸秋山呈錦繡紅葉滿林飛瞥不瞥知不知鏡裏無塵閒處照柴頭有火暗中吹十月朝接待開田歸上堂九月盡十月初山下開田山上開爐開田要博飯喫開爐暖熱身軀才飽暖氣力粗無事上山行一轉試問時人會也無會不會山裏石頭如土塊南康軍雲居山真如禪院卒庵和尚語録侍者文郁編紹定元年五月初三日受請拈帖片紙展信旗舒卷通消息其中一箇字今古無人識且道什麼字却煩維那對衆分剖州疏炳然字義文彩希奇夫子不識達磨不知同風千里笑展雙眉八十翁翁入場屋真箇不是小兒婚縣疏滅門刺史破家縣令一句全提頭正尾正塞却耳根諦聽諦聽提綱赤手為提綱豁開善法堂燈籠開口笑露柱放毫光竪拂子云去即印住住即印破不去不住玄關金鎖放開一線無可不可五老暗點頭東湖輕抹過唱箇月彎彎調古無人和且道洗腳上船一句如何話會倒拈七尺過眉杖不管廬山萬仞高入院指山門當門有路衝開碧落轉少移身將錯就錯一槌打碎趙州關空裏磨盤生八角方丈方丈門中了無罅縫維摩文殊相逢鼓籠昨夜三更打失鼻孔普請諸人各摸索著法座據此座者說無味話上下三指彼此七馬祝聖伏願聖明逾日月睿算等乾坤雨須風調民康物泰州府香判府提權郎中合郡文武官僚伏願開密嚴國涵育蒼生散無礙雲蔭覆天下為佛照和尚拈香根從江西來還向江西爇一笑掀天只自知天上拈來成漏泄佛照禪師有卒菴頌曰箇中消息憑誰委一笑掀天只自知索話舊店重開全無買賣擬欲近前知君納敗還在納敗底麼問答不録提綱入真如門見真如理升真如座說真如法如何是真如法趙州南石橋北觀音院裏有彌勒祖師遺下一隻履直至而今覔不得如斯舉唱便合散去救得一半其或未然未免全身人草放開明月湖光含萬象撥開天上雲卷舒自在直得五老頭出頭沒九江逆流須流漁翁舞棹野老觀呼唱太平歌樂無為化瑞鹿銜花引路